name: Build
on:
  push:
    branches: [main, 'fase*/**']
  pull_request: {}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci --no-audit --no-fund
      # Fase S·S4 (2026-07-19): lint en 0 errores -> BLOQUEANTE. No introducir
      # errores nuevos; el push a main despliega solo si lint y build pasan CI.
      - name: Lint (bloqueante)
        run: npm run lint
      - name: Typecheck
        run: npx tsc -b --force
      - run: npm run build
